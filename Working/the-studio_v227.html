<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Studio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root, .dark {
    --base:#1a1917; --panel:#222120; --panel-hi:#2a2927; --border:#3a3936; --border-soft:#2e2d2b;
    --label:#7a766f; --text:#c2bdb4; --text-bright:#fff; --faint:#5a5751; --accent:#ff2d78;
    --mono:'BerkeleyMono','SF Mono','Roboto Mono',ui-monospace,monospace;
  }
  .light {
    --base:#fff; --panel:#f5f5f5; --panel-hi:#fff; --border:#d4d4d4; --border-soft:#e6e6e6;
    --label:#909090; --text:#3a3a3a; --text-bright:#000; --faint:#b0b0b0; --accent:#ff2d78;
  }
  body { background:var(--base); color:var(--text); font-family:var(--mono); font-size:12px; line-height:1.8; -webkit-font-smoothing:antialiased; }
  .label { font-size:9px; letter-spacing:3px; color:var(--label); text-transform:uppercase; }

  .spine { position:fixed; left:0; top:0; bottom:0; width:40px; border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:16px 0; gap:14px; z-index:50; background:var(--base); }
  .spine-mark { width:18px; height:18px; border:1px solid var(--accent); display:flex; align-items:center; justify-content:center; color:var(--accent); font-size:10px; }
  .spine-text { writing-mode:vertical-rl; font-size:8px; letter-spacing:3px; color:var(--label); text-transform:uppercase; }
  .spine-toggle { writing-mode:vertical-rl; font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--label); padding:10px 5px; cursor:pointer; }
  .spine-toggle:hover { border-color:var(--accent); color:var(--accent); }
  .spine-notif { position:relative; width:18px; height:18px; border:1px solid var(--border); background:transparent; color:var(--label); cursor:pointer; font-size:9px; display:flex; align-items:center; justify-content:center; padding:0; }
  .spine-notif:hover { border-color:var(--accent); color:var(--accent); }
  .spine-notif .badge { position:absolute; top:-5px; right:-5px; min-width:13px; height:13px; background:var(--accent); color:#000; font-size:7px; display:flex; align-items:center; justify-content:center; padding:0 2px; }
  .notif-panel { position:fixed; left:48px; top:54px; z-index:80; width:300px; background:var(--panel-hi); border:1px solid var(--accent); max-height:70vh; overflow-y:auto; }
  .notif-head { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border-bottom:1px solid var(--border); }
  .notif-head .label { color:var(--accent); }
  .notif-clear { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:none; color:var(--label); cursor:pointer; }
  .notif-clear:hover { color:var(--accent); }
  .notif-item { padding:12px 14px; border-bottom:1px solid var(--border-soft); cursor:pointer; }
  .notif-item:last-child { border-bottom:none; }
  .notif-item:hover { background:var(--panel); }
  .notif-item.unread { border-left:2px solid var(--accent); }
  .notif-from { font-size:9px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; }
  .notif-snip { font-size:11px; color:var(--text); line-height:1.5; }
  .notif-empty { padding:24px 14px; text-align:center; font-size:9px; color:var(--faint); letter-spacing:1.5px; text-transform:uppercase; }
  .spine-ver { writing-mode:vertical-rl; font-size:8px; letter-spacing:2px; color:var(--faint); margin-top:auto; }

  .app { display:grid; grid-template-columns:230px 1fr 200px; min-height:100vh; width:100%; padding-left:40px; }

  .rail { border-right:1px solid var(--border); padding:22px 18px; position:sticky; top:0; align-self:start; height:100vh; overflow-y:auto; width:230px; }
  .brand { margin-bottom:20px; border:1px solid var(--border); padding:12px; position:relative; }
  .brand::before,.brand::after { content:''; position:absolute; width:6px; height:6px; border:1px solid var(--accent); }
  .brand::before { top:-1px; left:-1px; border-right:0; border-bottom:0; }
  .brand::after { bottom:-1px; right:-1px; border-left:0; border-top:0; }
  .brand-mark { font-size:14px; letter-spacing:4px; color:var(--text-bright); text-transform:uppercase; }
  .brand-sub { font-size:8px; letter-spacing:2px; color:var(--accent); text-transform:uppercase; margin-top:6px; }

  /* crew switcher */
  .crew-switch { position:relative; margin-bottom:20px; }
  .crew-current { width:100%; text-align:left; background:var(--panel-hi); border:1px solid var(--border); color:var(--text-bright); font-family:var(--mono); font-size:12px; letter-spacing:1px; text-transform:uppercase; padding:12px; cursor:pointer; display:flex; justify-content:space-between; align-items:flex-start; }
  .crew-current:hover { border-color:var(--accent); }
  .crew-current .caret { color:var(--accent); font-size:9px; margin-top:2px; }
  .crew-current > span:first-child { display:flex; flex-direction:column; }
  .crew-sub { font-size:8px; color:var(--label); letter-spacing:1px; margin-top:4px; }
  .crew-menu { position:absolute; left:0; right:0; top:100%; margin-top:4px; background:var(--panel-hi); border:1px solid var(--accent); z-index:30; }
  .crew-item { padding:11px 12px; cursor:pointer; border-bottom:1px solid var(--border-soft); text-transform:uppercase; letter-spacing:1px; font-size:11px; color:var(--text); }
  .crew-item:last-child { border-bottom:none; }
  .crew-item:hover { background:var(--panel); color:var(--text-bright); }
  .crew-item.on { color:var(--accent); }
  .crew-item-sub { font-size:8px; color:var(--faint); letter-spacing:1px; margin-top:2px; text-transform:uppercase; }
  .crew-divider { border-top:1px solid var(--border); }
  .crew-shared { color:var(--accent); }

  .rail-label { margin:8px 0 12px 2px; display:flex; justify-content:space-between; align-items:center; }
  .add-proj { font-family:var(--mono); font-size:14px; line-height:1; background:transparent; border:1px solid var(--border); color:var(--label); cursor:pointer; padding:0 6px; }
  .add-proj:hover { color:var(--accent); border-color:var(--accent); }
  .nb-input { width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text-bright); font-family:var(--mono); font-size:11px; padding:9px 11px; outline:none; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .nb-input:focus { border-color:var(--accent); }
  .nb-actions { display:flex; justify-content:flex-end; gap:8px; margin-bottom:10px; }
  .nb-create { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; background:var(--accent); color:#000; border:none; padding:7px 12px; cursor:pointer; }
  .ghost-btn { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:none; color:var(--label); cursor:pointer; }
  .ghost-btn:hover { color:var(--text-bright); }
  .proj-btn { text-align:left; background:transparent; border:1px solid var(--border-soft); color:var(--text); font-family:var(--mono); font-size:11px; letter-spacing:1px; padding:11px 12px; cursor:pointer; transition:all .12s; margin-bottom:4px; display:block; width:100%; text-transform:uppercase; position:relative; }
  .proj-btn:hover { border-color:var(--border); color:var(--text-bright); }
  .proj-btn.active { background:var(--panel-hi); border-color:var(--accent); color:var(--text-bright); }
  .proj-btn.active::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--accent); }
  .proj-row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .proj-vis { font-size:7px; letter-spacing:1px; padding:2px 5px; border:1px solid var(--border); color:var(--label); flex-shrink:0; }
  .proj-vis.public { color:var(--accent); border-color:var(--accent); }
  .proj-meta { font-size:8px; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

  .main { padding:24px 32px; min-height:100vh; position:relative; }
  .board-delete-wrap { position:absolute; top:24px; right:32px; z-index:5; }
  .board-head { padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:4px; }
  .board-title { font-size:22px; letter-spacing:3px; color:var(--text-bright); text-transform:uppercase; display:flex; align-items:center; gap:12px; }
  .board-desc { font-size:11px; color:var(--label); margin-top:6px; letter-spacing:.5px; text-transform:uppercase; }
  .board-mod { font-size:8px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-top:10px; }
  .vis-badge { font-size:9px; letter-spacing:2px; padding:4px 9px; border:1px solid var(--border); color:var(--label); text-transform:uppercase; }
  .vis-badge.public { color:var(--accent); border-color:var(--accent); }
  .vis-toggle { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--label); padding:5px 9px; cursor:pointer; margin-left:8px; }
  .vis-toggle:hover { color:var(--accent); border-color:var(--accent); }
  .follow-btn { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px solid var(--accent); color:var(--accent); padding:5px 11px; cursor:pointer; margin-left:8px; }
  .follow-btn:hover { background:var(--accent); color:#000; }
  .follow-btn.following { background:var(--accent); color:#000; }
  .rail-section { margin-top:18px; }
  .rail-section-label { margin:0 0 10px 2px; color:var(--faint); }
  .proj-crew { font-size:8px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
  .readonly-note { font-size:9px; color:var(--accent); letter-spacing:2px; text-transform:uppercase; border:1px solid var(--accent); padding:8px 12px; margin-bottom:20px; display:inline-block; }
  .index-bar { display:flex; justify-content:space-between; align-items:center; padding:16px 0 12px; }
  .index-bar .label { color:var(--faint); }
  .new-topic { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; background:var(--accent); color:#000; border:none; padding:9px 16px; cursor:pointer; }
  .new-topic:hover { opacity:.85; }
  .board-delete { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--label); padding:6px 11px; cursor:pointer; }
  .board-delete:hover { color:var(--accent); border-color:var(--accent); }
  .board-delete-confirm { display:flex; gap:8px; align-items:center; }
  .board-delete-confirm .warn { font-size:8px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; }
  .bd-yes { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; background:var(--accent); color:#000; border:none; padding:6px 11px; cursor:pointer; }
  .bd-no { font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--text); padding:6px 11px; cursor:pointer; }

  .topic-row { display:flex; align-items:center; gap:14px; padding:15px 4px; border-bottom:1px solid var(--border-soft); cursor:pointer; transition:all .12s; }
  .topic-row:hover { background:var(--panel); padding-left:10px; }
  .topic-row:hover .topic-title { color:var(--text-bright); }
  .topic-main { flex:1; min-width:0; }
  .topic-title { font-size:13px; color:var(--text); letter-spacing:1px; display:flex; align-items:center; gap:9px; text-transform:uppercase; }
  .topic-sub { font-size:9px; color:var(--faint); letter-spacing:1px; margin-top:4px; text-transform:uppercase; }
  .type-dot { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; padding:2px 7px; border:1px solid var(--border); color:var(--label); flex-shrink:0; }
  .type-dot.wip { color:var(--text-bright); border-color:var(--text-bright); }
  .type-dot.crit { color:var(--accent); border-color:var(--accent); }
  .type-dot.idea { color:#000; background:var(--accent); border-color:var(--accent); }
  .topic-stats { text-align:right; flex-shrink:0; }
  .topic-count { font-size:16px; color:var(--text-bright); }
  .topic-count-label { font-size:8px; color:var(--faint); letter-spacing:1px; text-transform:uppercase; }
  .topic-last { font-size:9px; color:var(--faint); letter-spacing:.5px; min-width:130px; text-align:right; flex-shrink:0; text-transform:uppercase; }
  @media (max-width:820px){ .topic-last { display:none; } }

  .back-link { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; background:transparent; border:none; color:var(--label); cursor:pointer; padding:0; margin-bottom:18px; }
  .back-link:hover { color:var(--accent); }
  .thread-title { font-size:22px; letter-spacing:2px; color:var(--text-bright); margin-bottom:8px; line-height:1.4; text-transform:uppercase; }
  .thread-meta { font-size:9px; color:var(--faint); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:22px; display:flex; align-items:center; gap:10px; }

  .post { display:flex; gap:16px; padding:22px 0; border-top:1px solid var(--border-soft); }
  .post:first-of-type { border-top:1px solid var(--border); }
  .post-side { width:120px; flex-shrink:0; text-align:center; }
  .post-avatar { width:46px; height:46px; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#000; border:1px solid var(--border); }
  .post-author { font-size:11px; color:var(--text-bright); letter-spacing:1px; text-transform:uppercase; }
  .post-role { font-size:8px; color:var(--faint); letter-spacing:1px; text-transform:uppercase; margin-top:3px; }
  .post-mod { font-size:8px; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; margin-top:6px; }
  .post-body-wrap { flex:1; min-width:0; }
  .post-time { font-size:8px; color:var(--faint); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }
  .post-body { font-size:12px; color:var(--text); line-height:1.9; white-space:pre-wrap; }
  .mention { color:var(--accent); background:rgba(255,45,120,.1); padding:0 3px; font-weight:700; }
  .mention-pop { position:absolute; z-index:45; background:var(--panel-hi); border:1px solid var(--accent); max-width:240px; max-height:200px; overflow-y:auto; }
  .mention-opt { display:flex; align-items:center; gap:9px; padding:8px 11px; cursor:pointer; border-bottom:1px solid var(--border-soft); }
  .mention-opt:last-child { border-bottom:none; }
  .mention-opt:hover, .mention-opt.active { background:var(--panel); }
  .mention-opt .ma { width:22px; height:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:8px; font-weight:700; color:#000; border:1px solid var(--border); }
  .mention-opt .mn { font-size:10px; color:var(--text-bright); letter-spacing:1px; text-transform:uppercase; }
  .mention-opt .mr { font-size:8px; color:var(--faint); letter-spacing:1px; text-transform:uppercase; }
  .mention-trigger { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--label); padding:8px 11px; cursor:pointer; }
  .mention-trigger:hover { color:var(--accent); border-color:var(--accent); }
  .post-img { margin-top:14px; border:1px solid var(--border); width:100%; max-height:520px; object-fit:contain; display:block; background:var(--panel); }
  .post-img.placeholder { height:160px; object-fit:cover; background-size:cover; background-position:center; background-repeat:no-repeat; }
  .drawover-btn { margin-top:8px; font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px solid var(--border); color:var(--label); padding:6px 12px; cursor:pointer; }
  .drawover-btn:hover { color:var(--accent); border-color:var(--accent); }
  .post-needs { display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; align-items:center; }
  .need { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); border:1px solid var(--accent); padding:3px 8px; }
  .status { font-size:8px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 9px; border:1px solid; }
  .status.open { color:var(--accent); border-color:var(--accent); }
  .status.inprogress { color:var(--text-bright); border-color:var(--text-bright); }
  .post-foot { margin-top:14px; display:flex; gap:18px; align-items:center; }
  .react-btn { font-family:var(--mono); font-size:10px; letter-spacing:1px; background:transparent; border:none; color:var(--label); cursor:pointer; display:flex; align-items:center; gap:6px; text-transform:uppercase; }
  .react-btn:hover { color:var(--text-bright); }
  .react-btn.reacted { color:var(--accent); }
  .join-btn { font-family:var(--mono); font-size:10px; letter-spacing:1px; text-transform:uppercase; background:transparent; border:none; color:var(--accent); cursor:pointer; }
  .join-btn:hover { text-decoration:underline; }
  .reply-to-btn { font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; background:transparent; border:none; color:var(--label); cursor:pointer; padding:0; }
  .reply-to-btn:hover { color:var(--accent); }
  .quote-block { border-left:2px solid var(--accent); background:var(--panel-hi); padding:8px 12px; margin-bottom:10px; cursor:pointer; }
  .quote-block:hover { background:var(--panel); }
  .quote-who { font-size:8px; color:var(--accent); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
  .quote-text { font-size:11px; color:var(--label); line-height:1.5; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .quote-img-tag { font-size:9px; color:var(--label); letter-spacing:1px; text-transform:uppercase; }
  .replying-banner { display:flex; justify-content:space-between; align-items:center; background:var(--panel-hi); border:1px solid var(--accent); padding:8px 12px; margin-bottom:10px; }
  .replying-banner .rb-text { font-size:9px; color:var(--accent); letter-spacing:1px; text-transform:uppercase; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .replying-banner .rb-cancel { font-family:var(--mono); font-size:11px; background:transparent; border:none; color:var(--label); cursor:pointer; }
  .replying-banner .rb-cancel:hover { color:var(--accent); }
  .emoji-row { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:12px; }
  .emoji-pill { display:flex; align-items:center; gap:5px; border:1px solid var(--border); background:var(--panel-hi); padding:3px 8px; cursor:pointer; font-family:var(--mono); font-size:11px; transition:all .12s; }
  .emoji-pill:hover { border-color:var(--label); }
  .emoji-pill.mine { border-color:var(--accent); background:rgba(255,45,120,.08); }
  .emoji-pill .ct { font-size:9px; color:var(--label); letter-spacing:1px; }
  .emoji-pill.mine .ct { color:var(--accent); }
  .emoji-add { border:1px dashed var(--border); background:transparent; color:var(--label); padding:3px 9px; cursor:pointer; font-family:var(--mono); font-size:12px; line-height:1; }
  .emoji-add:hover { border-color:var(--accent); color:var(--accent); }
  .emoji-pop { position:absolute; z-index:40; margin-top:4px; background:var(--panel-hi); border:1px solid var(--accent); padding:8px; display:flex; gap:4px; flex-wrap:wrap; max-width:200px; }
  .emoji-opt { background:transparent; border:none; cursor:pointer; font-size:18px; line-height:1; padding:4px; border-radius:0; }
  .emoji-opt:hover { background:var(--panel); }
  .emoji-wrap { position:relative; display:inline-block; }

  .reply-box { margin-top:8px; padding:22px 0 0; border-top:1px solid var(--border); }
  .reply-box-label { margin-bottom:12px; }
  .reply-box textarea { width:100%; background:var(--panel); border:1px solid var(--border); color:var(--text-bright); font-family:var(--mono); font-size:12px; line-height:1.8; padding:14px 16px; resize:vertical; min-height:80px; outline:none; }
  .reply-box textarea:focus { border-color:var(--accent); }
  .reply-foot { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
  .attach-btn { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; background:transparent; border:1px dashed var(--border); color:var(--label); padding:8px 13px; cursor:pointer; }
  .attach-btn:hover { color:var(--text-bright); border-color:var(--label); }
  .attach-btn.has { color:var(--accent); border-color:var(--accent); border-style:solid; }
  .post-btn { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; background:var(--accent); color:#000; border:none; padding:10px 20px; cursor:pointer; }
  .post-btn:hover { opacity:.85; }
  .post-btn:disabled { opacity:.25; cursor:default; }
  .mini-preview { margin-top:12px; position:relative; display:inline-block; max-width:220px; }
  .mini-preview img { max-width:220px; max-height:150px; border:1px solid var(--border); display:block; }
  .mini-preview button { position:absolute; top:6px; right:6px; font-family:var(--mono); font-size:8px; letter-spacing:1px; text-transform:uppercase; background:rgba(0,0,0,.7); color:#fff; border:1px solid var(--border); padding:3px 7px; cursor:pointer; }

  .reply { border-left:1px solid var(--border); padding:10px 0 10px 16px; margin-bottom:4px; }
  .reply-head { display:flex; align-items:center; gap:8px; margin-bottom:5px; }
  .reply-name { font-size:10px; color:var(--text-bright); letter-spacing:1px; text-transform:uppercase; }

<body class="dark">
<div class="spine">

</div>

</div>
<div id="drawOverlay"></div>
<div id="brushCursor"></div>

<script>
const me = { name:'You', role:'Director', color:'#a8823f', initials:'YO' };
const members = [
  { name:'You', role:'Director', color:'#a8823f', initials:'YO' },
  { name:'Mara K.', role:'Illustrator', color:'#5a7a9c', initials:'MK' },
  { name:'Devon R.', role:'Animator', color:'#a85a5a', initials:'DR' },
  { name:'Sol', role:'Colorist', color:'#5c8a5c', initials:'SO' },
  { name:'Ines T.', role:'Writer', color:'#8a6a9c', initials:'IT' },
  { name:'Kit V.', role:'Director', color:'#9c8a5a', initials:'KV' },
];
const TYPES = [{id:'wip',name:'WIP'},{id:'crit',name:'Crit'},{id:'idea',name:'Idea'}];
const NEED_TAGS = ['Animator','Colorist','Writer','Sound','Illustrator','Modeler'];
const DRAW_COLORS = ['#e0392b','#f0a020','#3aa84a','#2b78e0','#ffffff','#1a1714'];
/* curated emoji set — expand this array later to grow the picker */
const EMOJI_SET = ['🔥','👀','💡','🙌','❤️','😂','🎯','🤔'];
const typeName = id => (TYPES.find(t=>t.id===id)||{name:''}).name;

/* crews: which crews YOU belong to vs others */
let crews = [
  { id:'losq', name:'Losq Studios', mine:true, members:[members[0],members[1],members[3]] },
  { id:'nightshift', name:'Night Shift', mine:true, members:[members[0],members[2],members[4]] },
  { id:'paper', name:'Paper Tiger', mine:false, members:[members[5],members[1]] },
  { id:'fathom', name:'Fathom', mine:false, members:[members[2],members[4]] },
  { id:'risograph', name:'Riso Club', mine:false, members:[members[3],members[5]] },
];

let projects = [
  { id:'lighthouse', crew:'losq', name:'Lighthouse Short', desc:'A wordless two-minute piece.', moderator:members[4], visibility:'private', members:[members[4],members[1],members[3],members[0]] },
  { id:'forest', crew:'losq', name:'Forest Sequence', desc:'Backgrounds and walk cycles.', moderator:members[1], visibility:'public', members:[members[1],members[3],members[0]] },
  { id:'titles', crew:'nightshift', name:'Title Sequence', desc:'Main-on-end title design.', moderator:members[0], visibility:'private', members:[members[0],members[2]] },
  { id:'reel', crew:'nightshift', name:'Studio Reel', desc:'2026 sizzle cut.', moderator:members[0], visibility:'public', members:[members[0],members[4]] },
  { id:'feline', crew:'paper', name:'Feline Festival ID', desc:'Broadcast package for a film fest.', moderator:members[5], visibility:'public', members:[members[5],members[1]] },
  { id:'secret', crew:'paper', name:'Internal Rebrand', desc:'Hush hush.', moderator:members[5], visibility:'private', members:[members[5]] },
  { id:'deepblue', crew:'fathom', name:'Deep Blue Doc', desc:'Title cards for an ocean documentary.', moderator:members[2], visibility:'public', members:[members[2],members[4]] },
  { id:'risoposter', crew:'risograph', name:'Gig Poster Series', desc:'Two-color riso posters for a venue.', moderator:members[3], visibility:'public', members:[members[3],members[5]] },
];

let topics = [
  { id:1, project:'lighthouse', type:'idea', title:'A visual language for the sound jars', tags:['Animator','Sound','Colorist'], status:'open', reactions:7, reacted:true, emoji:{'🔥':['Mara K.','Devon R.','You'],'💡':['Ines T.']},
    posts:[ {author:members[4],time:'5h ago',body:'The keeper labels each jar with a hand-drawn symbol for the sound inside. The symbols build into a little visual language across the short.',imgSrc:null},
      {author:members[1],time:'4h ago',body:'In. Could sketch a first alphabet this week.',imgSrc:null} ] },
  { id:2, project:'forest', type:'wip', title:'Forest backgrounds, value pass 2', tags:[], status:null, reactions:4, reacted:false,
    posts:[ {author:members[1],time:'2h ago',body:'Pushed the value range darker so the foreground reads. Fighting the treeline silhouette on the left.',img:'linear-gradient(135deg,#1a2418,#2e3a22 60%,#0d130a)',imgSrc:null} ] },
  { id:3, project:'titles', type:'crit', title:'Kerning on the main title', tags:[], status:null, reactions:2, reacted:false,
    posts:[ {author:members[2],time:'1d ago',body:'The cap height feels tall against the lowercase. Eyes welcome.',imgSrc:null} ] },
  { id:4, project:'reel', type:'wip', title:'First assembly, 90 seconds', tags:[], status:null, reactions:5, reacted:false,
    posts:[ {author:members[4],time:'3h ago',body:'Rough cut of the reel. Music placeholder for now.',imgSrc:null} ] },
  { id:5, project:'feline', type:'idea', title:'Mascot motion study', tags:['Animator'], status:'open', reactions:6, reacted:false,
    posts:[ {author:members[5],time:'6h ago',body:'Looking for an animator to bring the festival cat to life. Public board, anyone can peek.',imgSrc:null} ] },
  { id:6, project:'deepblue', type:'crit', title:'Caustic light on the title cards', tags:[], status:null, reactions:3, reacted:false,
    posts:[ {author:members[2],time:'8h ago',body:'Trying to get the underwater caustics to feel real without overpowering the type. Thoughts welcome.',img:'linear-gradient(135deg,#0a1f2e,#13405a 60%,#06141d)',imgSrc:null} ] },
  { id:7, project:'risoposter', type:'idea', title:'Two-color misregistration as a feature', tags:['Illustrator'], status:'open', reactions:9, reacted:false,
    posts:[ {author:members[3],time:'1d ago',body:'Leaning into riso misregistration instead of fighting it. Want an illustrator who loves happy accidents.',img:'linear-gradient(135deg,#e8407a,#f0a020 60%,#fff)',imgSrc:null} ] },
];

let activeCrew='losq', activeProject='lighthouse', view='index', activeTopic=null;
let viewingSharedDir=false;
let viewingDiscover=false;
let formingCrew=false;
let crewMenuOpen=false, ntType='wip', ntTags=[], ntImg=null, replyImg=null;
let rosterManaging=false, boardDeleting=false;
let replyTo=null; // index of the post being replied to within the active topic
let followed=[]; // project ids the user follows
let notifications=[{ id:0, topicId:1, fromName:'Ines T. → @You', snippet:'@You should weigh in on the symbol language, this is your wheelhouse.', read:false }];
let notifOpen=false, nextNotifId=1;
let nextTopicId=8, projCounter=0;

const crewById = id => crews.find(c=>c.id===id);
const projById = id => projects.find(p=>p.id===id);
const projTopics = pid => topics.filter(t=>t.project===pid);
const crewProjects = cid => projects.filter(p=>p.crew===cid);
const lastPost = t => t.posts[t.posts.length-1];
function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function renderBody(s){
  let html=esc(s);
  // highlight @Mentions of known members (longest names first to avoid partial matches)
  const names=[...members.map(m=>m.name)].sort((a,b)=>b.length-a.length);
  names.forEach(n=>{
    const safe=esc(n).replace(/[.*+?^${}()|[\]\\]/g,'\\function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }');
    html=html.replace(new RegExp('@'+safe,'g'),`<span class="mention">@${esc(n)}</span>`);
  });
  return html;
}
function mentionedNames(s){
  return members.filter(m=>new RegExp('@'+m.name.replace(/[.*+?^${}()|[\]\\]/g,'\\function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }'),'').test(s)).map(m=>m.name);
}
function isReadOnly(){ const p=projById(activeProject); if(!p)return false; const c=crewById(p.crew); return !(c&&c.mine); }

/* ---------- CREW SWITCHER ---------- */
function renderCrew(){
  const c=crewById(activeCrew);
  const cur=document.getElementById('crewCurrent');
  if(formingCrew){
    cur.innerHTML = `<span><span class="crew-shared">+ Forming crew</span><span class="crew-sub">New workspace</span></span><span class="caret">▾</span>`;
  } else if(viewingDiscover){
    cur.innerHTML = `<span><span class="crew-shared">◆ Discover</span><span class="crew-sub">Curated public work</span></span><span class="caret">▾</span>`;
  } else if(viewingSharedDir){
    cur.innerHTML = `<span><span class="crew-shared">◆ Followed Projects</span><span class="crew-sub">Projects you follow</span></span><span class="caret">▾</span>`;
  } else {
    cur.innerHTML = `<span>${esc(c.name)}<span class="crew-sub">${c.members.length} crew &middot; ${crewProjects(c.id).length} boards</span></span><span class="caret">▾</span>`;
  }
  const menu=document.getElementById('crewMenu');
  menu.style.display = crewMenuOpen ? 'block' : 'none';
  if(crewMenuOpen){
    const mine=crews.filter(c=>c.mine);
    menu.innerHTML =
      mine.map(c=>`<div class="crew-item ${c.id===activeCrew&&!viewingSharedDir&&!viewingDiscover?'on':''}" data-crew="${c.id}">${esc(c.name)}<div class="crew-item-sub">${c.members.length} crew</div></div>`).join('')
      + `<div class="crew-item crew-divider ${viewingDiscover?'on':''}" data-discover><span class="crew-shared">◆ Discover</span><div class="crew-item-sub">Curated public work across crews</div></div>`
      + `<div class="crew-item ${viewingSharedDir?'on':''}" data-shared><span class="crew-shared">◆ Followed Projects</span><div class="crew-item-sub">Public boards you follow</div></div>`
      + `<div class="crew-item crew-divider" data-formcrew><span class="crew-shared">+ Form a crew</span><div class="crew-item-sub">Start a new workspace</div></div>`;
  }
}

/* ---------- RAIL ---------- */
function renderProjects(){
  const box=document.getElementById('projList');
  const heading=document.getElementById('railHeading');
  const addBtn=document.getElementById('addBoardBtn');
  if(formingCrew){
    heading.textContent='New Crew';
    addBtn.style.display='none';
    box.innerHTML=`<div class="add-empty" style="padding:10px 2px;line-height:1.7;">Name your crew in the main panel.</div>`;
    return;
  }
  if(viewingDiscover){
    heading.textContent='Discover';
    addBtn.style.display='none';
    box.innerHTML=`<div class="add-empty" style="padding:10px 2px;line-height:1.7;">The curator is mixing public work from across crews. Cards appear in the main panel.</div>`;
    return;
  }
  if(viewingSharedDir){
    heading.textContent='Followed';
    addBtn.style.display='none';
    const shared=followed.map(id=>projById(id)).filter(p=>p && p.visibility==='public');
    box.innerHTML = shared.length ? shared.map(p=>{
      const c=crewById(p.crew);
      return `<button class="proj-btn ${p.id===activeProject?'active':''}" data-board="${p.id}">
        <div class="proj-row"><span>${esc(p.name)}</span><span class="proj-vis public">Pub</span></div>
        <div class="proj-meta">${esc(c.name)} &middot; ${projTopics(p.id).length} topics</div>
      </button>`;
    }).join('') : `<div class="add-empty" style="padding:10px 2px;line-height:1.7;">No followed projects yet. Find work in Discover and follow it.</div>`;
    return;
  }
  heading.textContent='Boards';
  addBtn.style.display='';
  const list=crewProjects(activeCrew);
  let html = list.map(p=>{
    const mod = p.moderator ? (p.moderator.name===me.name?'You':p.moderator.name) : '';
    return `<button class="proj-btn ${p.id===activeProject?'active':''}" data-board="${p.id}">
      <div class="proj-row"><span>${esc(p.name)}</span><span class="proj-vis ${p.visibility}">${p.visibility==='public'?'Pub':'Priv'}</span></div>
      <div class="proj-meta">${projTopics(p.id).length} topics${mod?' &middot; mod '+esc(mod):''}</div>
    </button>`;
  }).join('') || `<div class="add-empty" style="padding:10px 2px;">No boards yet.</div>`;
  // followed boards from other crews
  const follows = followed.map(id=>projById(id)).filter(p=>p && p.visibility==='public' && crewById(p.crew) && !crewById(p.crew).mine);
  if(follows.length){
    html += `<div class="rail-section"><div class="label rail-section-label">Following</div>` + follows.map(p=>{
      const c=crewById(p.crew);
      return `<button class="proj-btn ${p.id===activeProject?'active':''}" data-board="${p.id}">
        <div class="proj-row"><span>${esc(p.name)}</span><span class="proj-vis public">Pub</span></div>
        <div class="proj-crew">${esc(c.name)}</div>
      </button>`;
    }).join('') + `</div>`;
  }
  box.innerHTML = html;
}

/* ---------- ROSTER ---------- */
function renderRoster(){
  const box=document.getElementById('roster');
  if(!box)return;

function crewMemberPool(){
  // people you can mention: members of the active board (fallback to crew)
  const p=projById(activeProject);
  if(p&&p.members&&p.members.length) return p.members;
  const c=crewById(activeCrew);
  return (c&&c.members)||members;
}
function mentionQuery(val, caret){
  // returns the partial name typed after the last '@' before the caret, or null
  const upto=val.slice(0,caret);
  const at=upto.lastIndexOf('@');
  if(at<0) return null;
  const frag=upto.slice(at+1);
  // a mention fragment shouldn't contain a newline; allow letters, spaces, dots
  if(/[\n]/.test(frag)) return null;
  return { at:at, frag:frag };
}
function updateMentionPop(){
  const ta=document.getElementById('replyText'); const pop=document.getElementById('mentionPop');
  if(!ta||!pop) return;
  const mq=mentionQuery(ta.value, ta.selectionStart);
  if(!mq){ pop.innerHTML=''; return; }
  const q=mq.frag.toLowerCase();
  const pool=crewMemberPool().filter(function(p){ return p.name.toLowerCase().indexOf(q)>=0; });
  if(!pool.length){ pop.innerHTML=''; return; }
  pop.innerHTML='<div class="mention-pop">'+pool.map(function(p){
    return '<div class="mention-opt" data-mention="'+esc(p.name)+'"><div class="ma" style="background:'+p.color+'">'+p.initials+'</div><div><div class="mn">'+(p.name===me.name?'You':esc(p.name))+'</div><div class="mr">'+esc(p.role)+'</div></div></div>';
  }).join('')+'</div>';
}
function insertMention(name){
  const ta=document.getElementById('replyText'); if(!ta)return;
  const val=ta.value, caret=ta.selectionStart;
  const mq=mentionQuery(val, caret);
  if(mq){ const np=mq.at+name.length+2; ta.value=val.slice(0,mq.at)+'@'+name+' '+val.slice(caret); ta.setSelectionRange(np,np); }
  else { ta.value=val.slice(0,caret)+'@'+name+' '+val.slice(caret); }
  const pop=document.getElementById('mentionPop'); if(pop) pop.innerHTML='';
  ta.focus(); syncReplyBtn();
}
function openMentionList(){
  const ta=document.getElementById('replyText'); if(!ta)return;
  const caret=ta.selectionStart;
  ta.value=ta.value.slice(0,caret)+'@'+ta.value.slice(caret);
  ta.setSelectionRange(caret+1,caret+1); ta.focus();
  updateMentionPop();
}

function publicOtherBoards(){

function boardRepImage(p){

}
function boardCalls(p){
  const calls=new Set();
  projTopics(p.id).forEach(t=>{ if(t.status==='open') t.tags.forEach(tag=>calls.add(tag)); });
  return [...calls];

      <div class="discover-sub">Public work from across the studio. Ordered for variety, not popularity, so the bubble stays open.</div>
    </div>
    <div id="curatorStatus"></div>
    <div class="discover-grid" id="discoverGrid">${cardsHTML(curatorCache?curatorCache.order.map(id=>projById(id)).filter(Boolean):boards)}</div>`;

  if(!curatorCache) runCurator(boards);

async function runCurator(boards){
  const status=document.getElementById('curatorStatus');
  if(status) status.innerHTML=`<div class="curator-loading"><span class="curator-dot"></span>Curator is mixing for variety...</div>`;
  const payload = boards.map(p=>({ id:p.id, name:p.name, crew:crewById(p.crew).name, topics:projTopics(p.id).length, calls:boardCalls(p), desc:p.desc }));
  const prompt = `You curate a discovery feed for a creative studio forum. Your ONE goal is VARIETY, deliberately countering engagement-optimizing algorithms that collapse into sameness. Given these public project boards from different crews, return a JSON object ordering them to maximize variety across crews, disciplines, and activity, never clustering similar things. For each board also write a VERY short curator note (max 8 words) framing it as worth learning from. Respond ONLY with JSON, no markdown: {"order":["id1","id2",...],"notes":{"id1":"note","id2":"note"}}. Boards: ${JSON.stringify(payload)}`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data=await res.json();
    let text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);
    const validIds=boards.map(b=>b.id);
    const order=parsed.order.filter(id=>validIds.includes(id));
    validIds.forEach(id=>{ if(!order.includes(id)) order.push(id); });
    curatorCache={ order, notes:parsed.notes||{} };
  }catch(err){
    // variety-shuffle fallback: interleave by crew so no crew clusters
    const byCrew={}; boards.forEach(b=>{ (byCrew[b.crew]=byCrew[b.crew]||[]).push(b.id); });
    const lists=Object.values(byCrew); const order=[]; let i=0;
    while(order.length<boards.length){ lists.forEach(l=>{ if(l[i])order.push(l[i]); }); i++; }
    curatorCache={ order, notes:{} };
  }
  if(viewingDiscover) renderDiscover();
}

function buildSwatches(){
  const box=document.getElementById('swatches'); if(!box)return;
  box.innerHTML='';
  const lab=document.createElement('span'); lab.className='label'; lab.textContent='Color'; box.appendChild(lab);
  DRAW_COLORS.forEach(c=>{ const b=document.createElement('button'); b.className='swatch'+(c===dColor?' on':''); b.style.background=c; b.setAttribute('data-color',c); box.appendChild(b); });
  const isPreset=DRAW_COLORS.includes(dColor);
  const chip=document.createElement('button'); chip.type='button'; chip.id='pickChip'; chip.setAttribute('data-act','pick'); chip.title='Custom color';
  chip.style.cssText='width:20px;height:20px;min-width:20px;flex:0 0 20px;border-radius:50%;border:2px solid '+(isPreset?'#888':'#fff')+';cursor:pointer;padding:0;display:inline-block;box-sizing:border-box;margin-left:6px;background:'+(isPreset?'conic-gradient(from 0deg,#e0392b,#f0a020,#3aa84a,#2b78e0,#a020c0,#e0392b)':dColor)+';';
  box.appendChild(chip);
  const inp=document.createElement('input'); inp.type='color'; inp.id='customColor'; inp.value=isPreset?'#a020c0':dColor;
  inp.style.cssText='position:absolute;width:0;height:0;opacity:0;border:0;padding:0;pointer-events:none;';
  box.appendChild(inp);
}
function setColor(c){ dColor=c; dErase=false; buildSwatches(); syncToolBtns(); }
function setColorLive(c){ dColor=c; dErase=false; syncToolBtns(); const chip=document.getElementById('pickChip'); if(chip){ chip.style.background=c; chip.style.borderColor='#fff'; } document.querySelectorAll('#swatches .swatch').forEach(s=>s.classList.remove('on')); }
function setErase(v){ dErase=v; syncToolBtns(); updateBrushCursor(); }
function syncToolBtns(){ const pen=document.getElementById('penBtn'),er=document.getElementById('eraseBtn'); if(pen)pen.classList.toggle('on',!dErase); if(er)er.classList.toggle('on',dErase); }
function composeCanvas(){ dCtx.clearRect(0,0,dCanvas.width,dCanvas.height); dCtx.drawImage(dBaseImg,0,0,dCanvas.width,dCanvas.height); dCtx.drawImage(aCanvas,0,0); }
function pushUndo(){ if(!aCtx)return; dStack.push(aCtx.getImageData(0,0,aCanvas.width,aCanvas.height)); if(dStack.length>25)dStack.shift(); const u=document.getElementById('undoBtn'); if(u)u.disabled=dStack.length<=1; }
function undoDraw(){ if(dStack.length<=1)return; dStack.pop(); aCtx.putImageData(dStack[dStack.length-1],0,0); composeCanvas(); const u=document.getElementById('undoBtn'); if(u)u.disabled=dStack.length<=1; }
function canvasPos(e){ const r=dCanvas.getBoundingClientRect(); const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left; const cy=(e.touches?e.touches[0].clientY:e.clientY)-r.top; return {x:cx*(dCanvas.width/r.width),y:cy*(dCanvas.height/r.height)}; }
function bindCanvas(){
  const start=e=>{ e.preventDefault(); dDrawing=true; const p=canvasPos(e); dLastX=p.x; dLastY=p.y; strokeTo(p.x,p.y); };
  const move=e=>{ if(!dDrawing)return; e.preventDefault(); const p=canvasPos(e); strokeTo(p.x,p.y); dLastX=p.x; dLastY=p.y; };
  const end=()=>{ if(dDrawing){ dDrawing=false; pushUndo(); } };
  dCanvas.onmousedown=start; dCanvas.onmousemove=move; window.addEventListener('mouseup',end);
  dCanvas.ontouchstart=start; dCanvas.ontouchmove=move; dCanvas.ontouchend=end;
  const cur=document.getElementById('brushCursor');
  dCanvas.addEventListener('mouseenter',()=>{ cur.style.display='block'; updateBrushCursor(); });
  dCanvas.addEventListener('mouseleave',()=>{ cur.style.display='none'; });
  dCanvas.addEventListener('mousemove',ev=>{ cur.style.left=ev.clientX+'px'; cur.style.top=ev.clientY+'px'; });
}
function updateBrushCursor(){ const cur=document.getElementById('brushCursor'); if(!cur||!dCanvas)return; const r=dCanvas.getBoundingClientRect(); const scale=r.width/dCanvas.width; const d=Math.max(4,dSize*scale); cur.style.width=d+'px'; cur.style.height=d+'px'; cur.style.borderColor=dErase?'#fff':'#ff2d78'; }
function strokeTo(x,y){
  aCtx.lineCap='round'; aCtx.lineJoin='round'; aCtx.lineWidth=dSize;
  if(dErase){ aCtx.globalCompositeOperation='destination-out'; aCtx.strokeStyle='rgba(0,0,0,1)'; }
  else { aCtx.globalCompositeOperation='source-over'; aCtx.strokeStyle=dColor; }
  aCtx.beginPath(); aCtx.moveTo(dLastX,dLastY); aCtx.lineTo(x,y); aCtx.stroke();
  aCtx.globalCompositeOperation='source-over'; composeCanvas();
}
function closeDraw(){ document.getElementById('drawOverlay').innerHTML=''; dCtx=null; aCtx=null; aCanvas=null; }
function postPaintover(){
  const data=dCanvas.toDataURL('image/png'); closeDraw();
  replyImg=data; const ta=document.getElementById('replyText'); if(ta&&!ta.value.trim())ta.value='Paint-over:';
  showReplyPreview(); syncReplyBtn(); const a=document.getElementById('attachBtn'); if(a)a.classList.add('has');
  const wrap=document.querySelector('.reply-box'); if(wrap)wrap.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ---------- REPLY ---------- */
function syncReplyBtn(){ const b=document.getElementById('replyBtn'); if(b)b.disabled=!((document.getElementById('replyText')||{}).value||'').trim()&&!replyImg; }
function showReplyPreview(){ const box=document.getElementById('replyPreview'); if(box&&replyImg)box.innerHTML=`<div class="mini-preview"><img src="${replyImg}"><button data-clearreply>remove</button></div>`; }
function clearReplyImg(){ replyImg=null; const b=document.getElementById('replyPreview'); if(b)b.innerHTML=''; const f=document.getElementById('replyFile'); if(f)f.value=''; const a=document.getElementById('attachBtn'); if(a)a.classList.remove('has'); syncReplyBtn(); }
function postReply(){
  const ta=document.getElementById('replyText'); const txt=(ta.value||'').trim();
  if(!txt&&!replyImg)return;
  const t=topics.find(x=>x.id===activeTopic);
  const post={author:me,time:'just now',body:txt,imgSrc:replyImg||null};
  if(replyTo!==null && t.posts[replyTo]) post.replyTo=replyTo;
  t.posts.push(post);
  if(txt){ const names=mentionedNames(txt); if(names.length) addMentionNotifs(names, me.name, t.id, txt); }
  replyImg=null; replyTo=null; renderThread();
  const wrap=document.querySelector('.reply-box'); if(wrap)wrap.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ---------- NEW TOPIC ---------- */
function syncNtBtn(){ const ok=((document.getElementById('ntTitle')||{}).value||'').trim()&&((document.getElementById('ntBody')||{}).value||'').trim(); const b=document.getElementById('ntPost'); if(b)b.disabled=!ok; }
function showNtPreview(){ const box=document.getElementById('ntPreview'); if(box&&ntImg)box.innerHTML=`<div class="mini-preview"><img src="${ntImg}"><button data-clearnt>remove</button></div>`; }
function clearNtImg(){ ntImg=null; const b=document.getElementById('ntPreview'); if(b)b.innerHTML=''; const f=document.getElementById('ntFile'); if(f)f.value=''; const a=document.getElementById('ntAttach'); if(a)a.classList.remove('has'); }
function createTopic(){
  const title=((document.getElementById('ntTitle')||{}).value||'').trim();
  const body=((document.getElementById('ntBody')||{}).value||'').trim();
  if(!title||!body)return;
  const t={ id:nextTopicId++, project:activeProject, type:ntType, title, tags:ntType==='idea'?[...ntTags]:[], status:(ntType==='idea'&&ntTags.length)?'open':null, reactions:0, reacted:false, posts:[{author:me,time:'just now',body,imgSrc:ntImg||null}] };
  topics.unshift(t); activeTopic=t.id; view='thread'; ntImg=null;
  renderProjects(); renderMain(); window.scrollTo(0,0);
}

/* ---------- NAV ---------- */
function openBoard(id){ activeProject=id; view='index'; activeTopic=null; replyImg=null; replyTo=null; boardDeleting=false; rosterManaging=false; viewingDiscover=false; viewingSharedDir=false; formingCrew=false; crewMenuOpen=false; renderCrew(); renderProjects(); renderRoster(); renderMain(); window.scrollTo(0,0); }
function openTopic(id){ activeTopic=id; view='thread'; replyImg=null; replyTo=null; renderMain(); window.scrollTo(0,0); }
function startNewTopic(){ if(isReadOnly())return; view='new'; ntType='wip'; ntTags=[]; ntImg=null; renderMain(); window.scrollTo(0,0); }
function switchCrew(id){
  activeCrew=id; viewingSharedDir=false; viewingDiscover=false; formingCrew=false; crewMenuOpen=false;
  const first=crewProjects(id)[0];
  activeProject=first?first.id:null; view='index'; activeTopic=null;
  renderCrew(); renderProjects(); renderRoster(); renderMain(); window.scrollTo(0,0);
}
function openSharedDir(){
  viewingSharedDir=true; viewingDiscover=false; formingCrew=false; crewMenuOpen=false;
  const shared=followed.map(id=>projById(id)).filter(p=>p && p.visibility==='public');
  activeProject=shared[0]?shared[0].id:null; view='index'; activeTopic=null;
  renderCrew(); renderProjects(); renderRoster(); renderMain(); window.scrollTo(0,0);
}
function openDiscover(){
  viewingDiscover=true; viewingSharedDir=false; formingCrew=false; crewMenuOpen=false; activeProject=null; activeTopic=null;
  document.getElementById('roster').innerHTML='';
  renderCrew(); renderProjects(); renderMain(); window.scrollTo(0,0);
}
function openFormCrew(){
  formingCrew=true; viewingDiscover=false; viewingSharedDir=false; crewMenuOpen=false; activeProject=null; activeTopic=null;
  document.getElementById('roster').innerHTML='';
  renderCrew(); renderProjects(); renderMain(); window.scrollTo(0,0);
  setTimeout(()=>{ const n=document.getElementById('fcName'); if(n)n.focus(); },0);
}
function createCrew(){
  const name=((document.getElementById('fcName')||{}).value||'').trim();
  const desc=((document.getElementById('fcDesc')||{}).value||'').trim();
  if(!name)return;
  const id='c'+Date.now();
  crews.push({ id, name, desc, mine:true, members:[me] });
  formingCrew=false;
  switchCrew(id);
}

/* ---------- MEMBERS ---------- */
function addMember(name){ const m=members.find(x=>x.name===name); const p=projById(activeProject); if(!m||!p)return; if(!p.members)p.members=[]; if(!p.members.some(x=>x.name===name))p.members.push(m); renderProjects(); renderRoster(); }
function removeMember(name){ const p=projById(activeProject); if(!p)return; if(p.moderator&&p.moderator.name===name)return; p.members=(p.members||[]).filter(x=>x.name!==name); renderProjects(); renderRoster(); }

/* ---------- BOARDS ---------- */
function toggleVisibility(id){ const p=projById(id); if(!p||!p.moderator||p.moderator.name!==me.name)return; p.visibility=p.visibility==='public'?'private':'public'; renderProjects(); renderMain(); }
function toggleFollow(id){ const p=projById(id); if(!p||p.visibility!=='public')return; followed=followed.includes(id)?followed.filter(x=>x!==id):[...followed,id]; renderProjects(); renderMain(); }
function deleteBoard(id){
  const p=projById(id); if(!p||!p.moderator||p.moderator.name!==me.name)return;
  topics=topics.filter(t=>t.project!==id); projects=projects.filter(x=>x.id!==id); boardDeleting=false;
  const rest=crewProjects(activeCrew);
  if(rest.length) openBoard(rest[0].id);
  else { activeProject=null; renderProjects(); renderRoster(); document.getElementById('main').innerHTML='<div class="empty">No boards yet. Create one.</div>'; }
}
function toggleNewBoard(){ const f=document.getElementById('newBoardForm'); const showing=f.style.display!=='none'; f.style.display=showing?'none':'block'; if(!showing){ const i=document.getElementById('newBoardName'); i.value=''; i.focus(); } }
function createBoard(){ const i=document.getElementById('newBoardName'); const name=(i.value||'').trim(); if(!name)return; const id='b'+(++projCounter)+'-'+Date.now(); projects.push({id,crew:activeCrew,name,desc:'',moderator:me,visibility:'private',members:[me]}); document.getElementById('newBoardForm').style.display='none'; openBoard(id); }

/* ---------- EVENTS ---------- */
document.addEventListener('click', e => {
  if(e.target.closest('#notifBell')){ notifOpen=!notifOpen; renderNotif(); return; }
  const ni=e.target.closest('[data-notif]'); if(ni){ openNotif(+ni.getAttribute('data-notif')); return; }
  if(e.target.closest('[data-notifclear]')){ notifications=[]; renderNotif(); return; }
  if(notifOpen && !e.target.closest('.notif-panel') && !e.target.closest('#notifBell')){ notifOpen=false; renderNotif(); }
  const mo=e.target.closest('[data-mention]'); if(mo){ insertMention(mo.getAttribute('data-mention')); return; }
  if(e.target.id==='mentionTrigger'){ openMentionList(); return; }
  if(e.target.closest('#crewCurrent')){ crewMenuOpen=!crewMenuOpen; renderCrew(); return; }
  const crewPick=e.target.closest('[data-crew]'); if(crewPick){ switchCrew(crewPick.getAttribute('data-crew')); return; }
  if(e.target.closest('[data-discover]')){ openDiscover(); return; }
  if(e.target.closest('[data-shared]')){ openSharedDir(); return; }
  if(e.target.closest('[data-formcrew]')){ openFormCrew(); return; }
  if(crewMenuOpen && !e.target.closest('.crew-switch')){ crewMenuOpen=false; renderCrew(); }

  const board=e.target.closest('[data-board]'); if(board){ openBoard(board.getAttribute('data-board')); return; }
  const topic=e.target.closest('[data-topic]'); if(topic){ openTopic(+topic.getAttribute('data-topic')); return; }
  const draw=e.target.closest('[data-draw]'); if(draw){ const [tid,idx]=draw.getAttribute('data-draw').split(':').map(Number); openDraw(tid,idx); return; }
  const rto=e.target.closest('[data-replyto]'); if(rto){ replyTo=+rto.getAttribute('data-replyto'); renderThread(); const ta=document.getElementById('replyText'); if(ta){ ta.focus(); const wrap=document.querySelector('.reply-box'); if(wrap)wrap.scrollIntoView({behavior:'smooth',block:'center'}); } return; }
  if(e.target.closest('[data-cancelreplyto]')){ replyTo=null; renderThread(); return; }
  const sc=e.target.closest('[data-scrollto]'); if(sc){ const idx=sc.getAttribute('data-scrollto'); const el=document.getElementById('post-'+activeTopic+'-'+idx); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.transition='background .3s'; el.style.background='rgba(255,45,120,.08)'; setTimeout(()=>{el.style.background='';},700); } return; }
  const react=e.target.closest('[data-react]'); if(react){ const t=topics.find(x=>x.id===+react.getAttribute('data-react')); t.reacted=!t.reacted; t.reactions+=t.reacted?1:-1; renderThread(); return; }
  const epill=e.target.closest('[data-emoji]'); if(epill){ const [tid,em]=epill.getAttribute('data-emoji').split(':'); closeEmojiPicker(); toggleEmoji(+tid, decodeURIComponent(em)); return; }
  const eadd=e.target.closest('[data-emojiadd]'); if(eadd){ const existing=document.getElementById('emojiPop'); if(existing){ closeEmojiPicker(); } else { openEmojiPicker(+eadd.getAttribute('data-emojiadd'), eadd); } return; }
  const epick=e.target.closest('[data-emojipick]'); if(epick){ const [tid,em]=epick.getAttribute('data-emojipick').split(':'); closeEmojiPicker(); toggleEmoji(+tid, decodeURIComponent(em)); return; }
  if(document.getElementById('emojiPop') && !e.target.closest('.emoji-wrap') && !e.target.closest('.emoji-pop')){ closeEmojiPicker(); }
  const join=e.target.closest('[data-join]'); if(join){ topics.find(x=>x.id===+join.getAttribute('data-join')).status='inprogress'; renderThread(); return; }
  const color=e.target.closest('[data-color]'); if(color){ setColor(color.getAttribute('data-color')); return; }
  const nttype=e.target.closest('[data-nttype]'); if(nttype){ ntType=nttype.getAttribute('data-nttype'); if(ntType!=='idea')ntTags=[]; renderNtTypes(); return; }
  const nttag=e.target.closest('[data-nttag]'); if(nttag){ const tg=nttag.getAttribute('data-nttag'); ntTags=ntTags.includes(tg)?ntTags.filter(x=>x!==tg):[...ntTags,tg]; renderNtTypes(); return; }
  if(e.target.closest('[data-clearreply]')){ clearReplyImg(); return; }
  if(e.target.closest('[data-clearnt]')){ clearNtImg(); return; }
  const rm=e.target.closest('[data-rostermanage]'); if(rm){ rosterManaging=!rosterManaging; renderRoster(); return; }
  const rem=e.target.closest('[data-removemember]'); if(rem){ removeMember(rem.getAttribute('data-removemember')); return; }
  const addm=e.target.closest('[data-addmember]'); if(addm){ addMember(addm.getAttribute('data-addmember')); return; }
  const vis=e.target.closest('[data-vistoggle]'); if(vis){ toggleVisibility(vis.getAttribute('data-vistoggle')); return; }
  const fol=e.target.closest('[data-follow]'); if(fol){ toggleFollow(fol.getAttribute('data-follow')); return; }
  if(e.target.closest('[data-deleteboard]')){ boardDeleting=true; renderMain(); return; }
  if(e.target.closest('[data-deleteno]')){ boardDeleting=false; renderMain(); return; }
  const dy=e.target.closest('[data-deleteyes]'); if(dy){ deleteBoard(dy.getAttribute('data-deleteyes')); return; }

  const ov=e.target.closest('[data-drawclose]'); if(ov&&e.target===ov){ closeDraw(); return; }
  const act=e.target.closest('[data-act]');
  if(act){ const a=act.getAttribute('data-act');
    if(a==='newtopic')startNewTopic(); else if(a==='close')closeDraw(); else if(a==='pen')setErase(false);
    else if(a==='erase')setErase(true); else if(a==='undo')undoDraw(); else if(a==='post')postPaintover();
    else if(a==='pick'){ const ci=document.getElementById('customColor'); if(ci)ci.click(); }
    return; }
  if(e.target.id==='attachBtn'){ document.getElementById('replyFile').click(); return; }
  if(e.target.id==='replyBtn'){ postReply(); return; }
  if(e.target.id==='ntAttach'){ document.getElementById('ntFile').click(); return; }
  if(e.target.id==='ntPost'){ createTopic(); return; }
  if(e.target.id==='addBoardBtn'){ toggleNewBoard(); return; }
  if(e.target.id==='nbCancel'){ toggleNewBoard(); return; }
  if(e.target.id==='nbCreate'){ createBoard(); return; }
  if(e.target.id==='fcCancel'){ formingCrew=false; switchCrew(activeCrew||crews.find(c=>c.mine).id); return; }
  if(e.target.id==='fcCreate'){ createCrew(); return; }
});
document.addEventListener('input', e => {
  if(e.target.id==='replyText'){ syncReplyBtn(); updateMentionPop(); }
  if(e.target.id==='ntTitle'||e.target.id==='ntBody') syncNtBtn();
  if(e.target.id==='fcName'){ const b=document.getElementById('fcCreate'); if(b) b.disabled=!e.target.value.trim(); }
  if(e.target.id==='sizeSlider'){ dSize=+e.target.value; updateBrushCursor(); }
  if(e.target.id==='customColor') setColorLive(e.target.value);
});
document.addEventListener('change', e => {
  if(e.target.id==='replyFile'){ const f=e.target.files[0]; if(f&&f.type.startsWith('image/')){ const r=new FileReader(); r.onload=ev=>{ replyImg=ev.target.result; showReplyPreview(); syncReplyBtn(); const a=document.getElementById('attachBtn'); if(a)a.classList.add('has'); }; r.readAsDataURL(f); } }
  if(e.target.id==='ntFile'){ const f=e.target.files[0]; if(f&&f.type.startsWith('image/')){ const r=new FileReader(); r.onload=ev=>{ ntImg=ev.target.result; showNtPreview(); const a=document.getElementById('ntAttach'); if(a)a.classList.add('has'); }; r.readAsDataURL(f); } }
});
document.addEventListener('keydown', e => { if(e.target.id==='newBoardName'){ if(e.key==='Enter')createBoard(); if(e.key==='Escape')toggleNewBoard(); } });
document.getElementById('themeToggle').addEventListener('click', ()=>{ const light=document.body.classList.toggle('light'); document.body.classList.toggle('dark',!light); document.getElementById('themeLabel').textContent=light?'DARK':'LIGHT'; });

/* ---------- INIT ---------- */
renderCrew(); renderProjects(); renderRoster(); renderMain(); renderNotif();
</script>
</body>
</html>
